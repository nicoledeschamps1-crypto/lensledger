<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Inter, -apple-system, sans-serif;
    color: #1a1a2e;
    background: #fff;
    padding: 48px;
    max-width: 800px;
    margin: 0 auto;
  }

  .invoice-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 2px solid #eee;
  }

  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-logo { max-height: 60px; max-width: 200px; object-fit: contain; }
  .brand-name { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .brand-sub { font-size: 13px; color: #666; margin-top: 2px; }

  .invoice-label { text-align: right; }
  .invoice-label h1 { font-size: 28px; font-weight: 700; color: #1a1a2e; letter-spacing: -1px; }
  .invoice-number { font-size: 14px; color: #666; margin-top: 4px; }

  .parties {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    margin-bottom: 40px;
  }

  .party-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #999; margin-bottom: 8px; font-weight: 600; }
  .party-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .party-detail { font-size: 13px; color: #666; line-height: 1.6; }

  .dates {
    display: flex;
    gap: 32px;
    margin-bottom: 32px;
    font-size: 13px;
  }
  .date-item span { color: #999; display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .date-item strong { color: #1a1a2e; }

  .line-items { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .line-items th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #999;
    padding: 10px 0;
    border-bottom: 2px solid #eee;
    font-weight: 600;
  }
  .line-items th:last-child, .line-items td:last-child { text-align: right; }
  .line-items td {
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 14px;
  }
  .line-items .mono { font-variant-numeric: tabular-nums; }

  .totals {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 48px;
  }
  .totals-box { min-width: 240px; }
  .totals-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
  }
  .totals-row.total {
    border-top: 2px solid #1a1a2e;
    margin-top: 8px;
    padding-top: 12px;
    font-size: 18px;
    font-weight: 700;
  }

  .notes {
    padding: 20px 24px;
    background: #f8f8fa;
    border-radius: 8px;
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .notes strong { color: #1a1a2e; display: block; margin-bottom: 6px; }

  .footer {
    text-align: center;
    font-size: 12px;
    color: #999;
    padding-top: 24px;
    border-top: 1px solid #eee;
  }

  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 32px;
  }
  .actions button {
    padding: 10px 24px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #fff;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }
  .actions button.primary {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }

  @media print {
    body { padding: 0; }
    .actions { display: none; }
  }
</style>
</head>
<body>

<div class="actions" id="actions">
  <button class="primary" onclick="window.print()">Download PDF</button>
  <button onclick="window.close()">Close</button>
</div>

<div class="invoice-header">
  <div class="brand">
    <img id="businessLogo" class="brand-logo" style="display:none;" alt="Business logo">
    <div>
      <div class="brand-name" id="businessName">LensLedger</div>
      <div class="brand-sub" id="businessEmail"></div>
    </div>
  </div>
  <div class="invoice-label">
    <h1>Invoice</h1>
    <div class="invoice-number" id="invoiceNumber"></div>
  </div>
</div>

<div class="parties">
  <div>
    <div class="party-label">From</div>
    <div class="party-name" id="fromName"></div>
    <div class="party-detail" id="fromDetails"></div>
  </div>
  <div>
    <div class="party-label">Bill To</div>
    <div class="party-name" id="toName"></div>
    <div class="party-detail" id="toDetails"></div>
  </div>
</div>

<div class="dates">
  <div class="date-item"><span>Invoice Date</span><strong id="issueDate"></strong></div>
  <div class="date-item"><span>Due Date</span><strong id="dueDate"></strong></div>
  <div class="date-item"><span>Status</span><strong id="invoiceStatus"></strong></div>
</div>

<table class="line-items">
  <thead>
    <tr>
      <th>Description</th>
      <th>Qty</th>
      <th>Rate</th>
      <th>Amount</th>
    </tr>
  </thead>
  <tbody id="lineItemsBody"></tbody>
</table>

<div class="totals">
  <div class="totals-box">
    <div class="totals-row"><span>Subtotal</span><span class="mono" id="subtotal"></span></div>
    <div class="totals-row total"><span>Total</span><span class="mono" id="totalAmount"></span></div>
  </div>
</div>

<div class="notes" id="notesSection" style="display:none;">
  <strong>Notes</strong>
  <span id="notesText"></span>
</div>

<div class="footer">
  Thank you for your business.
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  (async () => {
    const session = await getSession();
    if (!session) { window.location.href = '/index.html'; return; }

    const params = new URLSearchParams(window.location.search);
    const invoiceId = params.get('id');
    if (!invoiceId) { document.body.innerHTML = '<p>No invoice ID provided.</p>'; return; }

    // Load invoice
    const { data: inv, error } = await sb
      .from('invoices')
      .select('*, client:clients(*), items:invoice_items(*)')
      .eq('id', invoiceId)
      .single();

    if (error || !inv) { document.body.innerHTML = '<p>Invoice not found.</p>'; return; }

    // Load profile
    const { data: profile } = await sb
      .from('profiles')
      .select('*')
      .eq('id', session.user.id)
      .single();

    // Populate
    document.getElementById('invoiceNumber').textContent = inv.invoice_number;
    document.getElementById('fromName').textContent = profile?.business_name || profile?.full_name || session.user.email;
    document.getElementById('fromDetails').textContent = profile?.email || session.user.email;
    document.getElementById('businessName').textContent = profile?.business_name || profile?.full_name || 'LensLedger';
    document.getElementById('businessEmail').textContent = profile?.email || '';

    document.getElementById('toName').textContent = inv.client?.name || 'Client';
    const clientDetails = [inv.client?.email, inv.client?.phone].filter(Boolean).join(' | ');
    document.getElementById('toDetails').textContent = clientDetails;

    const fmtDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }) : '—';
    document.getElementById('issueDate').textContent = fmtDate(inv.issue_date);
    document.getElementById('dueDate').textContent = fmtDate(inv.due_date);
    document.getElementById('invoiceStatus').textContent = inv.status.charAt(0).toUpperCase() + inv.status.slice(1);

    // Line items
    const tbody = document.getElementById('lineItemsBody');
    const items = inv.items || [];
    tbody.innerHTML = items.map(item => `
      <tr>
        <td>${item.description}</td>
        <td class="mono">${Number(item.quantity)}</td>
        <td class="mono">$${Number(item.unit_price).toFixed(2)}</td>
        <td class="mono">$${Number(item.total).toFixed(2)}</td>
      </tr>
    `).join('');

    document.getElementById('subtotal').textContent = `$${Number(inv.subtotal).toFixed(2)}`;
    document.getElementById('totalAmount').textContent = `$${Number(inv.total).toFixed(2)}`;

    if (inv.notes) {
      document.getElementById('notesSection').style.display = 'block';
      document.getElementById('notesText').textContent = inv.notes;
    }

    // Logo from Supabase storage (if uploaded)
    try {
      const { data: logoFiles } = await sb.storage.from('receipts').list(session.user.id + '/logo');
      if (logoFiles && logoFiles.length > 0) {
        const { data: logoUrl } = await sb.storage.from('receipts').createSignedUrl(
          session.user.id + '/logo/' + logoFiles[0].name, 600
        );
        if (logoUrl) {
          const logoEl = document.getElementById('businessLogo');
          logoEl.src = logoUrl.signedUrl;
          logoEl.style.display = 'block';
        }
      }
    } catch (e) {
      // No logo uploaded, that's fine
    }

    document.title = `Invoice ${inv.invoice_number} — ${inv.client?.name || 'Client'}`;
  })();
</script>
</body>
</html>
